# ==========================================================================
# Cortex Docker Compose — Multi-Project Configuration
#
# This setup allows you to index multiple projects with separate indexes.
#
# Usage:
#   # Index project1
#   docker compose -f docker-compose.multi-project.yml run --rm cortex-project1 index /project
#
#   # Index project2
#   docker compose -f docker-compose.multi-project.yml run --rm cortex-project2 index /project
#
#   # Search in project1
#   docker compose -f docker-compose.multi-project.yml run --rm cortex-project1 search "handler"
#
#   # Serve MCP for project1
#   docker compose -f docker-compose.multi-project.yml run --rm cortex-project1 serve
# ==========================================================================

services:
  # Project 1
  cortex-project1:
    image: cortex
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./project1:/project
      - cortex-data-project1:/home/cortex/.cortex
    stdin_open: true
    tty: true
    working_dir: /project

  # Project 2
  cortex-project2:
    image: cortex
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./project2:/project
      - cortex-data-project2:/home/cortex/.cortex
    stdin_open: true
    tty: true
    working_dir: /project

  # Project 3 (example)
  cortex-project3:
    image: cortex
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./project3:/project
      - cortex-data-project3:/home/cortex/.cortex
    stdin_open: true
    tty: true
    working_dir: /project

volumes:
  cortex-data-project1:
    driver: local

  cortex-data-project2:
    driver: local

  cortex-data-project3:
    driver: local

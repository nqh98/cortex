# ==========================================================================
# Cortex Docker Compose Configuration
# Usage: docker compose run --rm cortex index /project
#        docker compose run --rm cortex search "handler"
#        docker compose run --rm cortex serve
# ==========================================================================

services:
  cortex:
    image: cortex
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount your project directory here
      - ./app:/project
      # Persistent storage for the index
      - cortex-data:/home/cortex/.cortex
      # Optional: Mount config file
      - ./config.toml:/project/config.toml:ro
    environment:
      - CORTEX_CONFIG=/project/config.toml
    stdin_open: true
    tty: true
    working_dir: /project

volumes:
  cortex-data:
    driver: local

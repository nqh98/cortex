name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler
      - name: Cargo check (with retries for ort-sys CDN flakiness)
        run: |
          for i in 1 2 3; do
            cargo check --all-features && exit 0
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler
      - name: Cargo test (with retries for ort-sys CDN flakiness)
        run: |
          for i in 1 2 3; do
            cargo test --all-features && exit 0
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler
      - name: Cargo clippy (with retries for ort-sys CDN flakiness)
        run: |
          for i in 1 2 3; do
            cargo clippy --all-features -- -D warnings && exit 0
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1

  build-release:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler
      - name: Cargo build release (with retries for ort-sys CDN flakiness)
        run: |
          for i in 1 2 3; do
            cargo build --release --all-features && exit 0
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1

  templates-sync:
    name: Templates Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check embedded templates match templates/ files
        run: ./scripts/check-templates-sync.sh
